; Passo 7 — motor único com timer de alta frequência + tick().
; Abra esta pasta como projeto ou: pio run -d lib/MotusDrivers/examples/02_single_isr
;
; No ESP32 o callback usa esp_timer (tarefa de alta prioridade), não o loop().

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../../../

; Passo 7 — motor único com timer de alta frequência + tick().
; Abra esta pasta como projeto ou: pio run -d lib/MotusDrivers/examples/02_single_isr
;
; No ESP32 o maestro usa hw_timer (tick estável em µs); esp_timer só em alvos sem hw_timer.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../../../

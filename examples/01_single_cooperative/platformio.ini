; Exemplo isolado: abra esta pasta como projeto no PlatformIO ou use:
;   pio run -d lib/MotusDrivers/examples/01_single_cooperative
;
; O diretório extra aponta para a raiz do projeto (onde está lib/).

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_extra_dirs = ../../../../
